name: Terraform

on:
  pull_request:
    paths:
      - "**/*.tf"
      - "config/**/*.yaml"
      - ".github/workflows/terraform.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.tf"
      - "config/**/*.yaml"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_WORKSPACE: ${{ secrets.TF_WORKSPACE }}
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_VAR_github_owner: ${{ vars.GH_OWNER }}
      GITHUB_TOKEN: ${{ secrets.GH_PROVIDER_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.4

      - name: Terraform Init
        run: terraform init

      - name: Terraform Fmt Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Render Terraform Plan
        if: github.event_name == 'pull_request'
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Comment Terraform Plan On PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('tfplan.txt', 'utf8');
            const maxLength = 60000;
            const trimmedPlan = plan.length > maxLength
              ? `${plan.slice(0, maxLength)}\n\n... plan output truncated ...`
              : plan;

            const body = [
              '## Terraform Plan',
              '',
              '<!-- terraform-plan-comment -->',
              '',
              '```text',
              trimmedPlan,
              '```',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes('<!-- terraform-plan-comment -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan